name: publish images

# Build and publish the two CI test images to GHCR (always) and Docker Hub
# (when DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets are set). Runs on a version
# tag, or manually. Tags each image with the git tag (or "latest") plus "latest".
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: build + push (${{ matrix.name }})
    runs-on: ubuntu-24.04
    env:
      PUBLISH_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: waymux-ci
            dockerfile: tests/e2e/Dockerfile
          - name: waymux-ci-plasma
            dockerfile: tests/e2e/Dockerfile.demo
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.PUBLISH_DOCKERHUB == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          IMAGE: ${{ matrix.name }}
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          ver="$GITHUB_REF_NAME"
          [ "$GITHUB_REF_TYPE" = "tag" ] || ver="latest"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          tags="ghcr.io/${owner}/${IMAGE}:${ver},ghcr.io/${owner}/${IMAGE}:latest"
          if [ "$PUBLISH_DOCKERHUB" = "true" ]; then
            tags="${tags},docker.io/${DH_USER}/${IMAGE}:${ver},docker.io/${DH_USER}/${IMAGE}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
